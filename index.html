<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f19;
    color: #e5e7eb;
}

.lang-switch {
    position: fixed; /* vẫn fixed nhưng mờ, nổi trên content */
    top: 20px;
    right: 40px;
    display: flex;
    padding: 6px;
    border-radius: 40px;
    background: rgba(15, 23, 42, 0.4); /* trong suốt hơn, nhìn thấy nội dung */
    backdrop-filter: blur(10px);
    border: 1px solid rgba(56,189,248,0.2);
    box-shadow: 0 0 15px rgba(56,189,248,0.2); /* nhẹ nhàng */
    z-index: 50; /* đủ nổi nhưng không quá cao */
}

.lang-btn {
    padding: 8px 18px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 13px;
    color: #9ca3af;
    transition: all 0.35s ease;
    z-index: 1;
}

.lang-btn.active {
    color: #020617;
    font-weight: 600;
}

.lang-switch::before {
    content: "";
    position: absolute;
    top: 6px;
    left: 6px;
    width: 45%;
    height: calc(100% - 12px);
    border-radius: 30px;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    transition: 0.35s ease;
    box-shadow: 0 0 15px rgba(99,102,241,0.6);
    z-index: 0; /* nền slider dưới nút */
}

.lang-switch.en::before {
    transform: translateX(100%);
}

/* ===== HERO ===== */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10%;
    background: radial-gradient(circle at top, #1e3a8a, #020617);
    flex-wrap: wrap;
}

.hero span { color: #38bdf8; }

.hero-text {
    max-width: 520px;
}

.intro {
    margin-top: 15px;
    font-size: 16px;
    line-height: 1.7;
    color: #9ca3af;
}

.intro strong {
    color: #38bdf8;
}

/* AVATAR */
.avatar {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #38bdf8;
    box-shadow: 0 0 40px rgba(56,189,248,0.6);
}

/* ACTIONS */
.hero-actions {
    margin-top: 30px;
    display: flex;
    gap: 15px;
}

/* BUTTON */
.btn {
    padding: 12px 22px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

/* PRIMARY */
.btn.primary {
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: #020617;
    font-weight: 600;
    box-shadow: 0 0 20px rgba(99,102,241,0.5);
}

.btn.primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(99,102,241,0.8);
}

/* GHOST */
.btn.ghost {
    border: 1px solid rgba(56,189,248,0.4);
    color: #38bdf8;
}

.btn.ghost:hover {
    background: rgba(56,189,248,0.1);
}

/* SECTION */
.section { padding: 80px 10%; }
.section h2 { color: #38bdf8; }

/* ===== ABOUT UPGRADE (CHỈ THÊM, KHÔNG PHÁ CODE) ===== */
#aboutText {
    font-size: 18px;
    line-height: 1.9;
    color: #cbd5f5;
    max-width: 800px;

    letter-spacing: 0.3px;
    text-align: justify;

    border-left: 3px solid #38bdf8;
    padding-left: 18px;
}

#aboutText strong {
    color: #38bdf8;
    font-weight: 600;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
}

/* CARD */
.card {
    background: rgba(17, 24, 39, 0.6);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 16px;
    border: 1px solid rgba(56,189,248,0.2);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px rgba(56,189,248,0.3);
}

/* SKILL TAG */
.skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
}

.skill-tag {
    padding: 8px 14px;
    background: rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(56, 189, 248, 0.4);
    border-radius: 20px;
}

.skill-tag:hover {
    background: #38bdf8;
    color: #020617;
}

/* MOBILE */
@media (max-width: 768px) {
    .hero { flex-direction: column; text-align: center; }
    .grid { grid-template-columns: 1fr; }
}
/* ===== SLIDER ===== */
.slider {
    position: relative;
    margin-top: 15px;
}

.slider img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 12px;
}

.slider-controls {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.slider-controls button {
    flex: 1;
    margin: 0 5px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: rgba(56,189,248,0.2);
    color: #38bdf8;
    cursor: pointer;
    transition: 0.3s;
}

.slider-controls button:hover {
    background: #38bdf8;
    color: #020617;
}

.achievements .item {
    background: #0f172a;

    padding: 12px;

    transition: 0.3s;

.achievements .item:hover {

}

.title {

}

.content {
    height: 0;
    overflow: hidden;
    transition: height 0.35s ease;
    font-size: 14px;
    color: #cbd5f5;
}

.item.active .content {
    max-height: 200px;
    margin-top: 8px;

</style>

let currentImages = [];
let currentIndex = 0;

function renderAchievements(lang) {
    const container = document.getElementById("achievementsList");
    const list = data[lang].achievements;
    container.innerHTML = "";

    list.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.onclick = () => toggleItem(div);

        div.innerHTML = `
            <div class="title">${item.title}</div>
            <div class="content">${item.content}</div>
        `;
        container.appendChild(div);
    });
}

function toggleItem(element) {
    const content = element.querySelector(".content");

    if (element.classList.contains("active")) {
        content.style.height = content.scrollHeight + "px";
        setTimeout(() => {
            content.style.height = "0px";
        }, 10);
        element.classList.remove("active");
    } else {
        content.style.height = content.scrollHeight + "px";
        element.classList.add("active");
    }
}

function showImage() {
    const img = document.getElementById("sliderImage");
    img.src = currentImages[currentIndex];
}

function nextImage() {
    currentIndex++;
    if (currentIndex >= currentImages.length) currentIndex = 0;
    showImage();
}

function prevImage() {
    currentIndex--;
    if (currentIndex < 0) currentIndex = currentImages.length - 1;
    showImage();
}

function setLang(lang, el) {

    // ===== TEXT =====
    for (let key in data[lang]) {
        if (key !== "skills" && key !== "images" && key !== "achievements") {
            const element = document.getElementById(key);
            if (element) {
                element.innerHTML = data[lang][key];
            }
        }
    }

    // ===== SKILLS =====
    const skillContainer = document.getElementById("skills");
    skillContainer.innerHTML = "";
    data[lang].skills.forEach(skill => {
        const span = document.createElement("span");
        span.className = "skill-tag";
        span.innerText = skill;
        skillContainer.appendChild(span);
    });

    // ===== ACHIEVEMENTS =====
    renderAchievements(lang);

    // ===== SLIDER =====
    currentImages = data[lang].images;
    currentIndex = 0;
    showImage();

    // ===== BUTTON ACTIVE =====
    document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.remove("active");
    });
    if(el) el.classList.add("active");

    // ===== SWITCH UI =====
    const switchBox = document.getElementById("langSwitch");
    if (lang === "en") {
        switchBox.classList.add("en");
    } else {
        switchBox.classList.remove("en");
    }
}

// Khởi tạo trang mặc định
